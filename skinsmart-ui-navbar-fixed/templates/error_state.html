<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} | SkinSmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1 { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="min-h-screen bg-[#f7f8f5] flex items-center justify-center p-6">
  <div class="w-full max-w-xl rounded-3xl border border-[#e4ece6] bg-white p-10 text-center shadow-xl shadow-[#0f3b2b]/10">
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-[#6a8275]">SkinSmart</p>
    <h1 class="mt-5 text-4xl text-[#1a2c25]">{{ title }}</h1>
    <p class="mt-4 text-[#5b6f65]">{{ message }}</p>
    <a href="{{ action_url }}" class="inline-flex mt-8 rounded-xl bg-[#4f7f63] px-6 py-3 font-semibold text-white hover:bg-[#426b54] transition">
      {{ action_label }}
    </a>
  </div>
<footer class="px-6 py-6 text-center text-sm text-gray-500">
  AI-based skincare suggestions only. Not a medical diagnosis.
</footer>
</body>
</html>
